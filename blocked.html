<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>URL Blocked</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafaf9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a18;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e0deda;
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .blocked-url {
      font-size: 12.5px;
      background: #FCEBEB;
      border-radius: 6px;
      padding: 6px 12px;
      margin: 12px 0 20px;
      word-break: break-all;
      font-family: monospace;
      color: #A32D2D;
    }

    p {
      font-size: 14px;
      color: #5F5E5A;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .btn-blue {
      background: #185FA5;
      color: white;
    }

    .btn-blue:hover {
      background: #0C447C;
    }

    .btn-ghost {
      background: none;
      color: #888780;
      border: 0.5px solid #d3d1c7;
    }

    .btn-ghost:hover {
      background: #F1EFE8;
      color: #1a1a18;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>This page is blocked</h1>
    <div class="blocked-url" id="blocked-url"></div>
    <p>This domain is on your block list. Add a specific page as an <strong>Allowed Page</strong> in the extension to
      access it.</p>
    <div class="buttons">
      <button class="btn btn-ghost" id="close-tab">Close Tab</button>
      <button class="btn btn-blue" id="new-tab">New Tab</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>

</html>
