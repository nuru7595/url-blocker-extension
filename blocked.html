<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>URL Blocked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="card">
    <div class="petals">🌸 🕯️ 🌸</div>
    <div class="main-title">Access Restricted</div>
    <div class="big-title">সামনে আপনার <em>পরীক্ষা</em></div>
    <div class="divider"></div>
    <div class="blocked-url" id="blocked-url"></div>
    <div class="message">
      আমি আপনাকে &nbsp;<strong id="site-name"></strong> যেতে দিচ্ছি না —<br>
      ফিরে যান, টা টা 👋
    </div>
    <div class="buttons">
      <button class="btn btn-outline" id="close-tab">✕ Close Tab</button>
      <button class="btn btn-rose" id="new-tab">🏠 New Tab</button>
    </div>
    <div class="footer-note">URL BLOCKER</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
