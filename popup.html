<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>URL Blocker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafaf9;
      color: #1a1a18;
    }

    .header {
      background: #fff;
      border-bottom: 0.5px solid #e0deda;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .shield-icon {
      width: 32px; height: 32px;
      background: #185FA5;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .title { font-size: 15px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #888780; margin-top: 1px; }

    .toggle-wrap { display: flex; align-items: center; gap: 7px; }
    .toggle-label { font-size: 12px; color: #888780; }
    .toggle { position: relative; width: 38px; height: 21px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #d3d1c7; border-radius: 21px; cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 15px; height: 15px; left: 3px; top: 3px;
      background: white; border-radius: 50%; transition: transform 0.2s;
    }
    input:checked + .slider { background: #185FA5; }
    input:checked + .slider::before { transform: translateX(17px); }

    .section {
      padding: 12px 16px;
      border-bottom: 0.5px solid #e0deda;
    }
    .section:last-of-type { border-bottom: none; }

    .section-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .badge-red { background: #FCEBEB; color: #A32D2D; }
    .badge-green { background: #EAF3DE; color: #3B6D11; }

    .section-title { font-size: 13px; font-weight: 600; color: #1a1a18; }
    .section-desc { font-size: 11px; color: #888780; margin-top: 2px; }

    .add-row { display: flex; gap: 6px; margin-bottom: 8px; }

    input[type="text"] {
      flex: 1; height: 32px;
      border: 0.5px solid #d3d1c7; border-radius: 6px;
      padding: 0 10px; font-size: 13px;
      background: #fff; color: #1a1a18; outline: none;
    }
    input[type="text"]:focus {
      border-color: #185FA5;
      box-shadow: 0 0 0 2px rgba(24,95,165,0.1);
    }
    input[type="text"]::placeholder { color: #b4b2a9; }

    .add-btn {
      height: 32px; padding: 0 12px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      white-space: nowrap;
    }
    .add-btn-red { background: #E24B4A; color: white; }
    .add-btn-red:hover { background: #A32D2D; }
    .add-btn-green { background: #1D9E75; color: white; }
    .add-btn-green:hover { background: #0F6E56; }

    .url-list {
      display: flex; flex-direction: column; gap: 4px;
      max-height: 140px; overflow-y: auto;
    }
    .url-item {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 0.5px solid #e0deda;
      border-radius: 7px; padding: 7px 10px;
    }
    .url-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: #E24B4A; }
    .dot-green { background: #1D9E75; }
    .url-text {
      flex: 1; font-size: 12.5px; color: #1a1a18;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: monospace;
    }
    .del-btn {
      background: none; border: none; color: #b4b2a9;
      cursor: pointer; font-size: 17px; padding: 0; line-height: 1; flex-shrink: 0;
    }
    .del-btn:hover { color: #E24B4A; }

    /* Per-item mini toggle */
    .item-toggle {
      position: relative; width: 28px; height: 16px;
      flex-shrink: 0; cursor: pointer;
    }
    .item-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .item-slider {
      position: absolute; inset: 0;
      background: #d3d1c7; border-radius: 16px; transition: background 0.18s;
    }
    .item-slider::before {
      content: ''; position: absolute;
      width: 10px; height: 10px; left: 3px; top: 3px;
      background: white; border-radius: 50%; transition: transform 0.18s;
    }
    .item-toggle input:checked + .item-slider-red { background: #E24B4A; }
    .item-toggle input:checked + .item-slider-green { background: #1D9E75; }
    .item-toggle input:checked + .item-slider::before { transform: translateX(12px); }

    .url-item-disabled { opacity: 0.6; }

    .empty { font-size: 12px; color: #b4b2a9; text-align: center; padding: 12px 0; }

    .status-bar {
      padding: 8px 16px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11.5px;
    }
    .status-on { background: #EAF3DE; color: #3B6D11; }
    .status-off { background: #F1EFE8; color: #888780; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sdot-on { background: #1D9E75; }
    .sdot-off { background: #b4b2a9; }

    .arrow-hint {
      font-size: 11px; color: #b4b2a9;
      padding: 0 16px 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .arrow-hint span { color: #E24B4A; font-family: monospace; font-size: 12px; }
    .arrow-hint i { color: #1D9E75; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="shield-icon">🛡️</div>
    <div>
      <div class="title">URL Blocker</div>
      <div class="subtitle">Block domains, allow specific pages</div>
    </div>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label" id="toggle-label">On</span>
    <label class="toggle">
      <input type="checkbox" id="enabled-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- BLOCKED DOMAINS -->
<div class="section">
  <div class="section-header">
    <span class="badge badge-red">🚫 Block</span>
    <div>
      <div class="section-title">Blocked Domains</div>
      <div class="section-desc">Entire domain will be blocked</div>
    </div>
  </div>
  <div class="add-row">
    <input type="text" id="domain-input" placeholder="e.g. facebook.com" />
    <button class="add-btn add-btn-red" id="domain-add-btn">+ Block</button>
  </div>
  <div class="url-list" id="domain-list">
    <div class="empty" id="domain-empty">No domains blocked yet.</div>
  </div>
</div>

<!-- UNBLOCKED PATHS -->
<div class="section">
  <div class="section-header">
    <span class="badge badge-green">✅ Allow</span>
    <div>
      <div class="section-title">Allowed Pages</div>
      <div class="section-desc">These specific pages stay accessible</div>
    </div>
  </div>
  <div class="add-row">
    <input type="text" id="path-input" placeholder="e.g. facebook.com/stories" />
    <button class="add-btn add-btn-green" id="path-add-btn">+ Allow</button>
  </div>
  <div class="url-list" id="path-list">
    <div class="empty" id="path-empty">No exceptions added yet.</div>
  </div>
</div>

<div class="arrow-hint">
  Example: Block <span>facebook.com</span> → Allow <i>facebook.com/stories</i>
</div>

<div class="status-bar status-on" id="status-bar">
  <div class="status-dot sdot-on" id="status-dot"></div>
  <span id="status-text">Active</span>
</div>

<script src="popup.js"></script>
</body>
</html>
